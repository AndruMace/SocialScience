services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: socialscience
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d socialscience"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
